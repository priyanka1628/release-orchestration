apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: release-demo-qa
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/priyanka1628/release-orchestration
    targetRevision: main
    path: k8s/qa
  destination:
    server: https://kubernetes.default.svc
    namespace: qa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true